<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>edrone Academy | Treinamentos de Vendas, Prospecção, E-commerce & Marketing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --yellow: #F5C518;
            --yellow-dark: #D4A800;
            --yellow-light: #FFF9E0;
            --black: #1A1A1A;
            --black-soft: #2D2D2D;
            --white: #FFFFFF;
            --gray-50: #FAFAFA;
            --gray-100: #F5F5F0;
            --gray-200: #E8E8E3;
            --gray-300: #D1D1CB;
            --gray-400: #999;
            --gray-500: #666;
            --gray-600: #444;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.10);
            --shadow-hover: 0 12px 40px rgba(0,0,0,0.14);
            --radius: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font);
            color: var(--black);
            background: var(--white);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a { text-decoration: none; color: inherit; }

        /* ===== NAVBAR ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            transition: var(--transition);
        }
        .navbar.scrolled {
            box-shadow: var(--shadow-md);
        }
        .navbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .navbar-logo {
            width: 36px;
            height: 36px;
            background: var(--yellow);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 18px;
            color: var(--black);
        }
        .navbar-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--black);
            letter-spacing: -0.3px;
        }
        .navbar-title span {
            color: var(--yellow-dark);
        }
        .navbar-links {
            display: flex;
            align-items: center;
            gap: 2rem;
            list-style: none;
        }
        .navbar-links a {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-500);
            transition: var(--transition);
        }
        .navbar-links a:hover {
            color: var(--black);
        }
        .navbar-cta {
            background: var(--yellow);
            color: var(--black);
            padding: 10px 22px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }
        .navbar-cta:hover {
            background: var(--yellow-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        /* ===== HERO ===== */
        .hero {
            padding: 140px 2rem 80px;
            background: linear-gradient(180deg, var(--white) 0%, var(--gray-50) 100%);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(245,197,24,0.08) 0%, transparent 70%);
            border-radius: 50%;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(245,197,24,0.05) 0%, transparent 70%);
            border-radius: 50%;
        }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--yellow-light);
            border: 1px solid rgba(245,197,24,0.3);
            padding: 8px 18px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            color: var(--yellow-dark);
            margin-bottom: 28px;
        }
        .hero-badge svg {
            width: 16px;
            height: 16px;
        }
        .hero h1 {
            font-size: clamp(36px, 5vw, 56px);
            font-weight: 900;
            line-height: 1.08;
            letter-spacing: -1.5px;
            color: var(--black);
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        .hero h1 span {
            color: var(--yellow-dark);
            position: relative;
        }
        .hero h1 span::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 0;
            right: 0;
            height: 8px;
            background: rgba(245,197,24,0.25);
            border-radius: 4px;
            z-index: -1;
        }
        .hero-subtitle {
            font-size: 18px;
            color: var(--gray-500);
            max-width: 640px;
            margin: 0 auto 36px;
            line-height: 1.65;
            position: relative;
            z-index: 1;
        }
        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 48px;
            margin-top: 48px;
            position: relative;
            z-index: 1;
        }
        .hero-stat {
            text-align: center;
        }
        .hero-stat-number {
            font-size: 32px;
            font-weight: 900;
            color: var(--black);
            letter-spacing: -1px;
        }
        .hero-stat-label {
            font-size: 13px;
            color: var(--gray-400);
            font-weight: 500;
            margin-top: 2px;
        }

        /* ===== MISSION ===== */
        .mission {
            padding: 80px 2rem;
            background: var(--black);
            color: var(--white);
            position: relative;
            overflow: hidden;
        }
        .mission::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--yellow);
        }
        .mission-inner {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 60px;
            align-items: center;
        }
        .mission-left h2 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .mission-left h2 span {
            color: var(--yellow);
        }
        .mission-left p.mission-tagline {
            font-size: 14px;
            color: var(--gray-400);
            font-weight: 500;
        }
        .mission-right p {
            font-size: 16px;
            color: rgba(255,255,255,0.75);
            line-height: 1.8;
            margin-bottom: 16px;
        }
        .mission-right strong {
            color: var(--yellow);
        }
        .mission-pillars {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 28px;
        }
        .mission-pillar {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 20px 16px;
            text-align: center;
        }
        .mission-pillar-icon {
            width: 40px;
            height: 40px;
            background: var(--yellow);
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }
        .mission-pillar-icon svg {
            width: 20px;
            height: 20px;
            color: var(--black);
        }
        .mission-pillar h4 {
            font-size: 13px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 4px;
        }
        .mission-pillar p {
            font-size: 11px !important;
            color: rgba(255,255,255,0.5) !important;
            line-height: 1.4 !important;
            margin-bottom: 0 !important;
        }

        /* ===== SECTION HEADER ===== */
        .section-header {
            text-align: center;
            margin-bottom: 48px;
        }
        .section-header h2 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: var(--black);
            margin-bottom: 12px;
        }
        .section-header p {
            font-size: 16px;
            color: var(--gray-500);
            max-width: 560px;
            margin: 0 auto;
        }

        /* ===== LEARINING PATH (TRILHA) ===== */
        .trilha {
            padding: 80px 2rem;
            background: var(--gray-50);
        }
        .trilha-inner {
            max-width: 1100px;
            margin: 0 auto;
        }
        .trilha-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .trilha-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            border: 1px solid var(--gray-200);
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }
        .trilha-card:hover {
            border-color: var(--yellow);
            box-shadow: var(--shadow-hover);
            transform: translateY(-4px);
        }
        .trilha-card-header {
            padding: 28px 28px 0;
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }
        .trilha-card-number {
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            background: var(--yellow);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 900;
            color: var(--black);
        }
        .trilha-card-meta {
            flex: 1;
        }
        .trilha-card-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 3px 10px;
            border-radius: 100px;
            margin-bottom: 8px;
        }
        .tag-vendas { background: #FFF3CD; color: #856404; }
        .tag-prospeccao { background: #E8F5E9; color: #2E7D32; }
        .tag-ecommerce { background: #E3F2FD; color: #1565C0; }
        .tag-marketing { background: #FCE4EC; color: #C62828; }
        .tag-crm { background: #F3E5F5; color: #6A1B9A; }
        .tag-neuro { background: #FFF8E1; color: #E65100; }

        .trilha-card-title {
            font-size: 17px;
            font-weight: 800;
            color: var(--black);
            letter-spacing: -0.3px;
            line-height: 1.35;
        }
        .trilha-card-body {
            padding: 14px 28px 0;
            flex: 1;
        }
        .trilha-card-desc {
            font-size: 13.5px;
            color: var(--gray-500);
            line-height: 1.6;
        }
        .trilha-card-footer {
            padding: 20px 28px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .trilha-card-format {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--gray-400);
            font-weight: 500;
        }
        .trilha-card-format svg {
            width: 14px;
            height: 14px;
            opacity: 0.6;
        }
        .trilha-card-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 700;
            color: var(--black);
            background: var(--yellow);
            padding: 10px 20px;
            border-radius: 8px;
            transition: var(--transition);
        }
        .trilha-card-link:hover {
            background: var(--yellow-dark);
            transform: translateX(2px);
        }
        .trilha-card-link svg {
            width: 14px;
            height: 14px;
            transition: var(--transition);
        }
        .trilha-card:hover .trilha-card-link svg {
            transform: translateX(3px);
        }

        /* ===== JOURNEY SECTION ===== */
        .journey {
            padding: 80px 2rem;
            background: var(--white);
        }
        .journey-inner {
            max-width: 900px;
            margin: 0 auto;
        }
        .journey-timeline {
            position: relative;
            padding-left: 60px;
        }
        .journey-timeline::before {
            content: '';
            position: absolute;
            left: 22px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, var(--yellow), var(--yellow-dark), var(--black));
            border-radius: 4px;
        }
        .journey-step {
            position: relative;
            margin-bottom: 40px;
        }
        .journey-step:last-child {
            margin-bottom: 0;
        }

            position: absolute;
            left: -49px;
            top: 4px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--yellow);
            border: 4px solid var(--white);
